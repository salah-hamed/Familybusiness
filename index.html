<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/Familybusiness/core/ui/theme.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Familybusiness</title>
</head>
<body>

  <h1>Authentication Test</h1>

  <input type="text" id="name" placeholder="Name">
  <br><br>

  <input type="email" id="email" placeholder="Email">
  <br><br>

  <input type="password" id="password" placeholder="Password">
  <br><br>

  <button id="registerBtn">
    Register
  </button>

  <button id="loginBtn">
    Login
  </button>

  <button id="logoutBtn">
    Logout
  </button>

  <p id="status"></p>

  <script type="module">

    import {
      registerUser,
      loginUser,
      logoutUser,
      observeAuth
    } from './core/auth/auth.js';

    const nameInput =
      document.getElementById("name");

    const emailInput =
      document.getElementById("email");

    const passwordInput =
      document.getElementById("password");

    const status =
      document.getElementById("status");


    // Register
    document
      .getElementById("registerBtn")
      .addEventListener("click", async () => {

        const result =
          await registerUser(
            nameInput.value,
            emailInput.value,
            passwordInput.value
          );

        if(result.success) {

          status.innerText =
            "Registered Successfully ✅";

        } else {

          status.innerText =
            result.error;

        }

      });


    // Login
    document
      .getElementById("loginBtn")
      .addEventListener("click", async () => {

        const result =
          await loginUser(
            emailInput.value,
            passwordInput.value
          );

       if(result.success) {

  window.location.href = "./dashboard/";

} else {

  status.innerText = result.error;

}

      });


    // Logout
    document
      .getElementById("logoutBtn")
      .addEventListener("click", async () => {

        await logoutUser();

        status.innerText =
          "Logged Out ✅";

      });


    // Observe Auth State
    observeAuth((user) => {

      if(user) {

        console.log("Current User:", user.email);

      } else {

        console.log("No User Logged In");

      }

    });

  </script>

</body>
</html>
