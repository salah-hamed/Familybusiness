<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/Familybusiness/core/ui/theme.css">
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ابدأ بناء شركتك | Family Business</title>
</head>
<body>
<div class="auth-card">
  <div class="logo-box">

    <div class="logo-icon">

        FB

    </div>

    <h2>

        Family Business

    </h2>

  </div>
  <h1>ابدأ بناء شركتك</h1>

<p>
أنت على بُعد دقيقة واحدة من امتلاك شركتك.
</p>

<input type="text" id="name" placeholder="الاسم">


<input type="email" id="email" placeholder="البريد الإلكتروني">


<input type="password" id="password" placeholder="كلمة المرور">



<button id="registerBtn">
    🚀 امتلك شركتك
</button>

<button id="loginBtn">
    تسجيل الدخول
</button>

<button id="logoutBtn">
    تسجيل الخروج
</button>

  <p id="status"></p>
</div>
  <script type="module">

    import {
      registerUser,
      loginUser,
      logoutUser,
      observeAuth
    } from './core/auth/auth.js';

    const nameInput =
      document.getElementById("name");

    const emailInput =
      document.getElementById("email");

    const passwordInput =
      document.getElementById("password");

    const status =
      document.getElementById("status");


    // Register
    document
      .getElementById("registerBtn")
      .addEventListener("click", async () => {

        const result =
          await registerUser(
            nameInput.value,
            emailInput.value,
            passwordInput.value
          );

        if(result.success) {

          status.innerText =
            "Registered Successfully ✅";

        } else {

          status.innerText =
            result.error;

        }

      });


    // Login
    document
      .getElementById("loginBtn")
      .addEventListener("click", async () => {

        const result =
          await loginUser(
            emailInput.value,
            passwordInput.value
          );

       if(result.success) {

  window.location.href = "./dashboard/";

} else {

  status.innerText = result.error;

}

      });


    // Logout
    document
      .getElementById("logoutBtn")
      .addEventListener("click", async () => {

        await logoutUser();

        status.innerText =
          "Logged Out ✅";

      });


    // Observe Auth State
    observeAuth((user) => {

      if(user) {

        console.log("Current User:", user.email);

      } else {

        console.log("No User Logged In");

      }

    });

  </script>

</body>
</html>
