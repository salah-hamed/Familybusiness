<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/Familybusiness/core/ui/theme.css">
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ابدأ بناء شركتك | Family Business</title>
</head>
<body>
<div class="auth-card">
  <div class="logo-box">

    <div class="logo-icon">

        FB

    </div>

    <h2>

        Family Business

    </h2>

  </div>
  <h1 id="pageTitle">ابدأ بناء شركتك</h1>

<p>
أنت على بُعد دقيقة واحدة من امتلاك شركتك.
</p>
<div id="nameGroup">
<input type="text" id="name" placeholder="الاسم">
</div>

<input type="email" id="email" placeholder="البريد الإلكتروني">


<input type="password" id="password" placeholder="كلمة المرور">
<div id="confirmPasswordGroup">
  <input
    type="password"
    id="confirmPassword"
    placeholder="تأكيد كلمة المرور">
</div>

<button id="registerBtn">
    🚀 امتلك شركتك
</button>

<p class="switch-mode">

    لديك حساب بالفعل؟

    <a href="#" id="loginBtn">

        تسجيل الدخول

    </a>

</p>

<button id="logoutBtn">
    تسجيل الخروج
</button>

  <p id="status"></p>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
