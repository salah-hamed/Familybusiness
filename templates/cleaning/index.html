<!DOCTYPE html>
<html lang="ar">
<head>
  <link rel="stylesheet" href="/Familybusiness/core/ui/theme.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>خدمة تنظيف</title>

</head>

<body>
<div style="position:fixed;top:0;left:0;z-index:999999;background:red;color:white;padding:10px">
TEST PAGE VERSION
</div>
<div class="container">

<div class="header">
<h1 id="businessTitle">خدمة تنظيف</h1>
<p>احجز خدمتك خلال دقائق</p>
</div>

<div class="card">

<input id="customerName" placeholder="الاسم">
<input id="customerPhone" placeholder="رقم الهاتف">
<input id="customerAddress" placeholder="العنوان">

<button class="locationBtn" id="getLocationBtn">
📍 تحديد موقعي الحالي
</button>

<input id="location" placeholder="الموقع">

<select id="rooms">
<option value="1">غرفة</option>
<option value="2">غرفتين</option>
<option value="3">3 غرف</option>
</select>

<select id="bathrooms">
<option value="1">حمام</option>
<option value="2">حمامين</option>
</select>

<select id="kitchen">
<option value="yes">مطبخ</option>
<option value="no">بدون مطبخ</option>
</select>
<label>تنظيف السلم</label>
<select id="stairs">
  <option value="no">لا</option>
  <option value="yes">نعم</option>
</select>
<br><br>

<label>تاريخ الزيارة</label>
<input type="date" id="visitDate">
<br><br>

<label>وقت الزيارة</label>
<input type="time" id="visitTime">
<br><br>
<div class="priceBox" id="priceBox"></div>

<button id="submitOrder">احجز الآن</button>

<div id="status"></div>

</div>

<div class="card">

<a id="whatsappBtn" class="actionBtn whatsapp" target="_blank">
تواصل عبر واتساب
</a>

<a id="paymentBtn" class="actionBtn payment" target="_blank">
الدفع عبر InstaPay
</a>

</div>

<div class="ctaBox">

<h3>ابدأ مشروعك الخاص الآن</h3>

<p>
امتلك مشروعًا رقميًا جاهزًا وابدأ البيع فورًا
</p>

<a
class="ctaLink"
href="https://salah-hamed.github.io/Familybusiness/"
>
استكشف المشاريع المتاحة
</a>

</div>

</div>

<script type="module" src="./app.js"></script>

</body>
  </html>
