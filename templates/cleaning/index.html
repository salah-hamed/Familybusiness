<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>خدمة تنظيف</title>

<style>

body{
margin:0;
font-family:Arial;
direction:rtl;
background:linear-gradient(135deg,#4f46e5,#06b6d4);
color:#fff;
}

.container{
max-width:520px;
margin:auto;
padding:15px;
}

.header{
text-align:center;
padding:20px 10px;
}

.card{
background:#fff;
color:#111;
padding:15px;
border-radius:18px;
margin-bottom:15px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

input,select,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
}

button{
background:#111;
color:#fff;
border:none;
font-weight:bold;
}

.priceBox{
font-size:24px;
text-align:center;
font-weight:bold;
color:#4f46e5;
margin:10px 0;
}

.cta{
text-align:center;
font-size:13px;
margin-top:20px;
opacity:.9;
}

a{
display:block;
text-align:center;
padding:12px;
border-radius:12px;
background:#fff;
color:#111;
text-decoration:none;
margin:8px 0;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1 id="businessTitle">خدمة تنظيف</h1>
<p>احصل على خدمة تنظيف احترافية خلال دقائق</p>
</div>

<div class="card">

<input id="customerName" placeholder="الاسم">
<input id="customerPhone" placeholder="رقم الهاتف">
<input id="customerAddress" placeholder="العنوان">

<select id="rooms">
<option value="1">غرفة</option>
<option value="2">غرفتين</option>
<option value="3">3 غرف</option>
</select>

<select id="bathrooms">
<option value="1">حمام</option>
<option value="2">حمامين</option>
</select>

<select id="kitchen">
<option value="yes">مطبخ</option>
<option value="no">بدون مطبخ</option>
</select>

<div class="priceBox" id="priceBox">
جاري حساب السعر...
</div>

<button id="submitOrder">
احجز الآن
</button>

<div id="status"></div>

</div>

<div class="card">

<a id="whatsappBtn">تواصل واتساب</a>
<a id="paymentBtn">الدفع الآن</a>

</div>

<div class="cta">
🚀 اطلب خدمتك بسهولة خلال دقائق بدون أي تعقيد
</div>

</div>

<script type="module" src="./app.js"></script>

</body>
</html>
