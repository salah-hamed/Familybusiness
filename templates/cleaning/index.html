<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>خدمة تنظيف</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
direction:rtl;
}

.container{
max-width:500px;
margin:auto;
padding:15px;
}

.card{
background:#fff;
padding:18px;
border-radius:16px;
box-shadow:0 3px 12px rgba(0,0,0,.08);
margin-bottom:15px;
}

input,select,button,a{
width:100%;
padding:12px;
margin:7px 0;
border-radius:10px;
border:1px solid #ddd;
box-sizing:border-box;
font-size:15px;
}

button{
background:#111;
color:#fff;
border:none;
}

a{
display:block;
text-align:center;
text-decoration:none;
background:#f1f1f1;
color:#111;
}

.price{
font-size:22px;
font-weight:bold;
text-align:center;
margin:10px 0;
}

.cta{
text-align:center;
font-size:14px;
padding:20px;
}
</style>

</head>
<body>

<div class="container">

<div class="card">

<h2 id="businessTitle">خدمة تنظيف</h2>

<p>احجز خدمة تنظيف منزل بسهولة.</p>

<input id="customerName" placeholder="الاسم">

<input id="customerPhone" placeholder="الهاتف">

<input id="customerAddress" placeholder="العنوان">

<select id="rooms">
<option value="1">غرفة واحدة</option>
<option value="2">غرفتين</option>
<option value="3">3 غرف</option>
<option value="4">4 غرف</option>
</select>

<select id="bathrooms">
<option value="1">حمام</option>
<option value="2">2 حمام</option>
<option value="3">3 حمام</option>
</select>

<select id="kitchen">
<option value="yes">يوجد مطبخ</option>
<option value="no">بدون مطبخ</option>
</select>

<input type="date" id="visitDate">

<input type="time" id="visitTime">

<input id="location" placeholder="الموقع">

<div class="price" id="priceBox">
150 جنيه
</div>

<button id="submitOrder">
إرسال الطلب
</button>

<a id="whatsappBtn" target="_blank">
تواصل واتساب
</a>

<a id="paymentBtn" target="_blank">
الدفع الآن
</a>

<p id="status"></p>

</div>

<div class="card">
<h3>حالة الطلب</h3>
<p id="orderState">لم يتم الطلب بعد</p>
</div>

<div class="cta">

ابدأ مشروعك الخاص الآن

<br><br>

<a href="https://salah-hamed.github.io/Familybusiness/">
الدخول للمنصة
</a>

</div>

</div>

<script type="module" src="./app.js"></script>

</body>
</html>
