<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Dashboard</title>
  <style>
.statCard{
  background:#fff;
  color:#111;
  padding:20px;
  border-radius:16px;
  text-align:center;
  font-weight:bold;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  font-size:18px;
}

.statCard::before{
  content:"";
  display:block;
  font-size:12px;
  color:#666;
  margin-bottom:5px;
}

#newOrders::before{content:"جديدة";}
#acceptedOrders::before{content:"مقبولة";}
#doneOrders::before{content:"منفذة";}
#canceledOrders::before{content:"ملغية";}
  </style>
</head>
<body>

  <h1>User Dashboard</h1>

  <p id="userName"></p>
  <p id="userEmail"></p>
  <p id="projectType"></p>
  <p id="status"></p>
<h3>رابط مشروعك</h3>

<input id="projectLink" readonly style="width:90%;">
<br><br>

<button id="copyLinkBtn">نسخ الرابط</button>
<p id="copyStatus"></p>
  <button id="logoutBtn">Logout</button>
<hr>
<hr>

<h2>إعدادات مشروعك</h2>
<hr>

<h2>تسعير الخدمة</h2>

<input id="basePrice" placeholder="سعر أساسي">

<input id="roomPrice" placeholder="سعر الغرفة">

<input id="bathroomPrice" placeholder="سعر الحمام">

<input id="kitchenPrice" placeholder="سعر المطبخ">
<input id="stairsPrice" placeholder="سعر تنظيف السلم">
<button id="savePricingBtn">
حفظ الأسعار
</button>

<p id="pricingStatus"></p>
<input id="businessName" placeholder="اسم النشاط">
<br><br>

<input id="whatsappNumber" placeholder="رقم واتساب">
<br><br>

<input id="instapayLink" placeholder="رابط إنستا باي">
<br><br>

<button id="saveSettingsBtn">حفظ الإعدادات</button>

<p id="settingsStatus"></p>
  <div id="statsContainer" style="
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-bottom:15px;
">

  <div class="statCard" id="newOrders">0</div>
  <div class="statCard" id="acceptedOrders">0</div>
  <div class="statCard" id="doneOrders">0</div>
  <div class="statCard" id="canceledOrders">0</div>

  </div>
<h2>الطلبات</h2>

<div id="ordersContainer"></div>
  <script type="module" src="./dashboard.js"></script>

</body>
</html>
